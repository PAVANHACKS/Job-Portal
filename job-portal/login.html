<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  perspective: 1000px;
}

.form-box {
  width: 350px;
  padding: 30px;
  background: white;
  border-radius: 15px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  transform: rotateY(10deg) rotateX(10deg);
  transition: 0.5s;
}

.form-box:hover {
  transform: rotateY(0deg) rotateX(0deg) scale(1.05);
}

h2 {
  text-align: center;
}

.input-box {
  position: relative;
  margin: 15px 0;
}

.input-box input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
}

.input-box span {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

button {
  width: 100%;
  padding: 12px;
  background: #667eea;
  border: none;
  color: white;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #5a67d8;
}

.links {
  margin-top: 10px;
  text-align: center;
}

.links a {
  display: block;
  margin: 5px 0;
  color: #667eea;
  text-decoration: none;
  font-size: 14px;
}

.footer {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <div class="form-box">
    <h2>Login</h2>
<form action="backend/login.php" method="POST">      <div class="input-box">
        <input type="email" name="email" placeholder="Email ID" required>
      </div>

      <div class="input-box">
        <input type="password" id="password" name="password" placeholder="Password" required>
        <span onclick="togglePassword()">👁</span>
      </div>

      <button type="submit">Login</button>

      <div class="links">
        <a href="#">Forgot Password?</a>
        <a href="register.html">Not yet registered? Register</a>
      </div>

    </form>
  </div>
</div>

<div class="footer">
  © 2026 All Rights Reserved
</div>

<script>
function togglePassword() {
  const field = document.getElementById("password");
  field.type = field.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
